name: Prewarm Nix cache
on:
  push:
    branches: [main]
  workflow_dispatch: {}
concurrency:
  group: prewarm
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    runs-on: [self-hosted, hades]
    steps:
      - uses: actions/checkout@v4

      - name: Build every machine
        run: make build-machines
